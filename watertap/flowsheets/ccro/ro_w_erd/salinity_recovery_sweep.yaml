two_stage_1_pump_salinity_recovery_sweep:
  build_defaults:
    n_stages: 2
    flow_vol: 0.001
    salt_mass_frac: 0.035
    water_recovery: 0.5
    perm_conc: 0.5
    pump_dict: {1: True, 2: False}
  build_loop:
    salt_mass_frac:
      - 0.005
      - 0.015
      - 0.025
      - 0.035
      - 0.045
      - 0.055
      - 0.065
      - 0.075
      # - 0.1
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: fs.system_recovery
        lower_limit: 0.2
        upper_limit: 0.9
        num_samples: 11

two_stage_2_pump_salinity_recovery_sweep:
  build_defaults:
    n_stages: 2
    flow_vol: 0.001
    salt_mass_frac: 0.035
    water_recovery: 0.5
    perm_conc: 0.5
    pump_dict: {1: True, 2: True}
  build_loop:
    salt_mass_frac:
      - 0.005
      - 0.015
      - 0.025
      - 0.035
      - 0.045
      - 0.055
      - 0.065
      - 0.075
      # - 0.1
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: fs.system_recovery
        lower_limit: 0.2
        upper_limit: 0.9
        num_samples: 11

