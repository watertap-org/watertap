
PW_sweep:
  build_defaults:
    n_stages: 2
    flow_vol: 0.001
    salt_mass_frac: 0.075
    water_recovery: 0.5
    perm_conc: 0.5
    pump_dict: {1: True, 2: False}
    hpro_costing: True
  build_loop:
    add_erd:
      - True
      - False
    build_loop:
      stage_sim_cases:
        1_stage_1_pump:
          n_stages: 1
          pump_dict: {1: True}
        2_stage_1_pump:
          n_stages: 2
          pump_dict: {1: True, 2: False}
        2_stage_2_pump:
          n_stages: 2
          pump_dict: {1: True, 2: True}
      sweep_param_loop:
        recovery:
          type: LinearSample
          param: fs.system_recovery
          lower_limit: 0.2
          upper_limit: 0.55
          num_samples: 36

