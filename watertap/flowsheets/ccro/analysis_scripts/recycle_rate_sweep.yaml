SW_recycle_rate_sweep:
  build_defaults:
    feed_tds: 35
    overall_water_recovery: 0.5 # recovery for build
    recovery: 0.5 # analysis recovery
    time_steps: 20
    n_flushing_points: 5
    osmotic_overpressure: 2
    total_cycle_time_lb: 10
    cycle_time_ratio_lb: 0.5
    cycle_time_ratio_ub: 0.999999
    use_perm_conc_target: False
    use_rejection_target: True
    flushing_time_lb: 60
    max_cycle_time_hr: 2
    # rejection_bounds: (0.985, 1)
    rejection_lb: 0.985
    rejection_ub: 1
  sweep_param_loop:
    recycle_rate:
      type: LinearSample
      param: recycle_flowrate
      lower_limit: 0.01
      upper_limit: 0.05
      num_samples: 41


