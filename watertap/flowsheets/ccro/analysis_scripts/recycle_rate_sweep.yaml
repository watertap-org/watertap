BW_recycle_rate_sweep_SEC_obj:
  build_defaults:
    feed_tds: 5
    overall_water_recovery: 0.5 # recovery for build
    recovery: 0.9 # analysis recovery
    time_steps: 20
    n_flushing_points: 5
    osmotic_overpressure: 2
    total_cycle_time_lb: 10
    total_cycle_time_ub: 120
    cycle_time_ratio_lb: 0.5
    cycle_time_ratio_ub: 0.999999
    recycle_flowrate_lb: 0.0005
    use_perm_conc_target: True
    use_rejection_target: False
    flushing_time_lb: 30
    rejection_lb: 0.985
    rejection_ub: 1
    objective: "SEC"
  sweep_param_loop:
    recycle_rate:
      type: LinearSample
      param: recycle_flowrate
      lower_limit: 0.005
      upper_limit: 0.035
      num_samples: 31

