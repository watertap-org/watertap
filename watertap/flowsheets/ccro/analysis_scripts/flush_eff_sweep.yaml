
BW_flushing_eff_sweep:
  build_defaults:
    overall_recovery: 0.95
    feed_tds: 5
    A_comp: 5
    B_comp: 0.5
    time_steps: 10
    n_flushing_points: 5
    fixed_setup: False
    use_hold_up: True
  sweep_param_loop:
    recovery:
      type: LinearSample
      param: flushing.flushing_efficiency
      lower_limit: 0.1
      upper_limit: 0.5
      num_samples: 11

SW_flushing_eff_sweep:
  build_defaults:
    overall_recovery: 0.5
    feed_tds: 35
    A_comp: 1.5
    B_comp: 0.1
    time_steps: 10
    n_flushing_points: 5
    fixed_setup: False
    use_hold_up: True
  sweep_param_loop:
    flushing_efficiency:
      type: LinearSample
      param: flushing.flushing_efficiency
      lower_limit: 0.1
      upper_limit: 0.5
      num_samples: 11