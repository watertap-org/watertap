
BW_recovery_sweep:
  build_defaults:
    feed_tds: 5
    A_comp: 5
    B_comp: 0.5
    time_steps: 20
    n_flushing_points: 5
    fixed_setup: False
    use_hold_up: True
  build_loop:
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: overall_recovery
        lower_limit: 0.75
        upper_limit: 0.95
        num_samples: 11

SW_recovery_sweep:
  build_defaults:
    feed_tds: 35
    A_comp: 1.5
    B_comp: 0.1
    time_steps: 20
    n_flushing_points: 5
    fixed_setup: False
    use_hold_up: True
  build_loop:
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: overall_recovery
        lower_limit: 0.40
        upper_limit: 0.60
        num_samples: 11