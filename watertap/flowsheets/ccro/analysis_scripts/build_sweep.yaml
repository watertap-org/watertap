ramp_rate_ub_and_min_cycle_time_sweep:
  build_defaults:
    feed_tds: 35
    A_comp: 1.5
    B_comp: 0.1
    time_steps: 10
    n_flushing_points: 5
    min_cycle_time_hr: 0.16667
    osmotic_overpressure: 2
    ramp_rate_ub: 3
    fixed_setup: False
    use_hold_up: True
    overall_water_recovery: 0.5
  build_loop:
    min_cycle_time_hr:
      - 0.001667
      - 0.01667
      - 0.1667
      - 0.33333
      - 0.5
    ramp_rate_ub:
      - 2
      - 3
      - 4
      - 6
      - 10
    sweep_param_loop:
      final_concentration:
        type: LinearSample
        param: overall_recovery
        lower_limit: 0.4
        upper_limit: 0.5
        num_samples: 3