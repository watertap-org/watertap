study_BGW_mesh_study_optimization_lcow:
  build_defaults:
    feed_tds: 5
    fixed_setup: False
    time_steps: 40
    n_flushing_points: 10
  build_loop:
    time_steps:
      - 20
      - 40
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: overall_recovery
        lower_limit: 0.5
        upper_limit: 0.9
        num_samples: 21  

study_SW_mesh_study_optimization_lcow:
  build_defaults:
    feed_tds: 35
    fixed_setup: False
    time_steps: 40
    n_flushing_points: 10
  build_loop:
    time_steps:
      - 20
      - 40
    sweep_param_loop:
      recovery:
        type: LinearSample
        param: overall_recovery
        lower_limit: 0.4
        upper_limit: 0.7
        num_samples: 16

